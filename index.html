<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIXMES</title>
  <style>
    :root {
      --bg: #f7f7f4;
      --paper: rgba(255, 255, 255, 0.78);
      --ink: #777777;
      --ink-dark: #5f5f5f;
      --line: #9a9a9a;
      --soft: rgba(255, 255, 255, 0.54);
      --shadow: rgba(70, 70, 70, 0.14);
      --radius: 24px;
      --max-width: 980px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.68), transparent 24%),
        linear-gradient(120deg, #ffb6d9, #ffd48a, #fff59a, #9effc2, #9ad7ff, #c6a5ff, #ffb6d9);
      background-size: 300% 300%;
      color: var(--ink-dark);
      font-family: "Trebuchet MS", "Comic Sans MS", system-ui, sans-serif;
      animation: rainbowFlow 12s ease-in-out infinite;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.42), transparent 16%),
        radial-gradient(circle at 76% 18%, rgba(255, 255, 255, 0.32), transparent 14%),
        radial-gradient(circle at 52% 84%, rgba(255, 255, 255, 0.34), transparent 18%);
      mix-blend-mode: soft-light;
      animation: shimmer 8s ease-in-out infinite alternate;
    }

    @keyframes rainbowFlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes shimmer {
      from { opacity: 0.45; transform: translateY(0); }
      to { opacity: 0.8; transform: translateY(-18px); }
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(100% - 32px, var(--max-width));
      min-height: 100vh;
      margin: 0 auto;
      padding: 32px 0 42px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 28px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: end;
      margin-bottom: 34px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .nickname-wrap {
      min-height: 118px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nickname-img {
      max-width: min(520px, 100%);
      max-height: 150px;
      object-fit: contain;
      object-position: center;
      filter: drop-shadow(0 8px 0 rgba(0, 0, 0, 0.03));
    }

    .fallback-title {
      display: none;
      margin: 0;
      color: var(--ink);
      font-size: clamp(64px, 13vw, 132px);
      line-height: 0.85;
      letter-spacing: -0.08em;
      font-weight: 900;
      text-transform: uppercase;
    }

    .nickname-img[src=""],
    .nickname-img:not([src]) {
      display: none;
    }

    .nickname-img[src=""] + .fallback-title,
    .nickname-img:not([src]) + .fallback-title {
      display: block;
    }

    .intro-card {
      position: relative;
      width: min(100%, 390px);
      padding: 20px 22px 22px;
      background: var(--paper);
      border: 5px solid var(--line);
      border-radius: 8px 18px 10px 12px;
      box-shadow: 10px 10px 0 rgba(120, 120, 120, 0.11);
      transform: rotate(-1deg);
    }

    .intro-card::before,
    .intro-card::after {
      content: "";
      position: absolute;
      background: var(--bg);
      opacity: 0.9;
      transform: rotate(3deg);
    }

    .intro-card::before {
      width: 70px;
      height: 7px;
      left: 26px;
      top: -8px;
    }

    .intro-card::after {
      width: 48px;
      height: 6px;
      right: 32px;
      bottom: -8px;
    }

    .section-title {
      display: inline-block;
      margin: 0 0 14px;
      padding: 3px 12px 6px;
      border: 4px solid var(--line);
      border-radius: 4px 12px 5px 9px;
      color: var(--ink);
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1;
      font-weight: 800;
      transform: rotate(1deg);
    }

    .intro-text {
      margin: 0;
      color: var(--ink-dark);
      font-size: 18px;
      line-height: 1.55;
    }

    .cat-block {
      display: flex;
      justify-content: center;
      align-items: end;
      min-height: 320px;
    }

    .cat-frame {
      position: relative;
      width: min(100%, 360px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      cursor: pointer;
      touch-action: manipulation;
    }

    .cat-face {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 18px 0 rgba(0, 0, 0, 0.04));
      animation: floaty 4s ease-in-out infinite;
    }

    .cat-face[src=""],
    .cat-face:not([src]) {
      display: none;
    }

    .cat-fallback {
      width: 260px;
      height: 260px;
      display: none;
      place-items: center;
      border: 6px solid var(--line);
      border-radius: 50%;
      color: var(--ink);
      font-size: 96px;
      background: var(--paper);
      box-shadow: 12px 12px 0 rgba(120, 120, 120, 0.12);
      animation: floaty 4s ease-in-out infinite;
    }

    .cat-face[src=""] + .cat-fallback,
    .cat-face:not([src]) + .cat-fallback {
      display: grid;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(1deg); }
      50% { transform: translateY(-10px) rotate(-1deg); }
    }

    .cat-frame:hover .cat-face,
    .cat-frame:hover .cat-fallback,
    .cat-frame:focus-visible .cat-face,
    .cat-frame:focus-visible .cat-fallback,
    .cat-frame.is-spinning .cat-face,
    .cat-frame.is-spinning .cat-fallback {
      animation: catSpin 760ms ease-in-out 1;
    }

    @keyframes catSpin {
      0% { transform: rotate(0deg) scale(1); }
      45% { transform: rotate(190deg) scale(1.08); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      margin-top: 28px;
    }

    .panel {
      position: relative;
      padding: 22px;
      background: rgba(255, 255, 255, 0.82);
      border: 4px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 8px 8px 0 var(--shadow);
    }

    .panel h2 {
      margin: 0 0 16px;
      color: var(--ink);
      font-size: clamp(26px, 4vw, 40px);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .skills-list,
    .links-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .skill-item {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 12px;
      align-items: start;
      padding-bottom: 10px;
      border-bottom: 3px solid rgba(150, 150, 150, 0.45);
      color: var(--ink-dark);
      font-size: 19px;
      line-height: 1.35;
    }

    .skill-mark {
      width: 28px;
      height: 7px;
      margin-top: 12px;
      background: var(--line);
      border-radius: 999px;
      transform: rotate(-2deg);
    }

    .skill-name {
      font-weight: 800;
    }

    .skill-note {
      display: block;
      margin-top: 3px;
      font-size: 15px;
      opacity: 0.78;
    }

    .chain-divider {
      position: relative;
      margin: 46px auto 30px;
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .chain-img {
      width: min(720px, 96%);
      max-height: 92px;
      object-fit: contain;
      opacity: 0.76;
    }

    .chain-img[src=""],
    .chain-img:not([src]) {
      display: none;
    }

    .chain-fallback {
      width: min(720px, 96%);
      height: 54px;
      display: none;
      align-items: center;
      justify-content: space-between;
      color: var(--line);
    }

    .chain-img[src=""] + .chain-fallback,
    .chain-img:not([src]) + .chain-fallback {
      display: flex;
    }

    .chain-fallback span {
      width: 84px;
      height: 44px;
      border: 4px solid var(--line);
      border-radius: 50%;
      transform: rotate(-6deg);
      background: rgba(255, 255, 255, 0.35);
    }

    .chain-fallback::before {
      content: "";
      position: absolute;
      width: min(710px, 92%);
      height: 4px;
      background: var(--line);
      opacity: 0.7;
      z-index: -1;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 58px;
      padding: 12px 14px;
      border: 4px solid transparent;
      border-radius: 18px;
      background: var(--soft);
      color: var(--ink-dark);
      font-size: 20px;
      font-weight: 800;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .link-card:hover,
    .link-card:focus-visible {
      transform: translateY(-3px) rotate(-1deg);
      border-color: var(--line);
      background: #fff;
      outline: none;
    }

    .checkbox {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 5px solid var(--line);
      border-radius: 8px;
      color: var(--line);
      font-size: 30px;
      line-height: 1;
    }

    .small-text {
      margin: 16px 0 0;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.5;
      opacity: 0.86;
    }

    .footer {
      margin-top: 34px;
      padding-top: 20px;
      border-top: 3px solid rgba(150, 150, 150, 0.42);
      color: var(--ink);
      font-size: 15px;
      text-align: center;
    }

    .top-logo {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .center-cat {
      display: grid;
      place-items: center;
    }

    .bottom-links {
      width: min(100%, 540px);
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 12px;
      background: rgba(255, 255, 255, 0.62);
      border: 4px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 8px 8px 0 var(--shadow);
      backdrop-filter: blur(8px);
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 22px, var(--max-width));
        padding-top: 26px;
      }

      .hero,
      .grid {
        grid-template-columns: 1fr;
      }

      .cat-block {
        min-height: 230px;
        order: -1;
      }

      .cat-frame {
        width: min(290px, 86vw);
      }

      .nickname-wrap {
        min-height: 90px;
      }

      .intro-card {
        width: 100%;
      }

      .chain-fallback span {
        width: 56px;
        height: 34px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="top-logo" aria-label="Никнейм">
      <div class="nickname-wrap">
        <!-- Вставь сюда PNG ника. Пример: src="assets/nickname.png" -->
        <img class="nickname-img" src="assets/nickname.png" alt="FIXMES" />
        <h1 class="fallback-title">FIXMES</h1>
      </div>
    </header>

    <section class="center-cat" aria-label="Кот">
      <div class="cat-frame" tabindex="0" aria-label="Покрутить кота" title="Покрутить кота">
        <!-- Вставь сюда PNG морды кота. Пример: src="assets/cat-face.png" -->
        <img class="cat-face" src="assets/cat-face.png" alt="Морда кота" />
        <div class="cat-fallback" aria-hidden="true">:3</div>
      </div>
    </section>

    <nav class="bottom-links" aria-label="Ссылки">
      <a class="link-card" href="https://t.me/fixmes" target="_blank" rel="noreferrer">
        <span class="checkbox">✓</span>
        <span>телеграм</span>
      </a>
      <a class="link-card" href="https://vk.com/fixmes" target="_blank" rel="noreferrer">
        <span class="checkbox">✓</span>
        <span>вконтакте</span>
      </a>
      <a class="link-card" href="https://t.me/fixmesss" target="_blank" rel="noreferrer">
        <span class="checkbox">✓</span>
        <span>написать мне</span>
      </a>
    </nav>
  </main>

  <script>
    const catFrame = document.querySelector(".cat-frame");

    if (catFrame) {
      catFrame.addEventListener("click", () => {
        catFrame.classList.remove("is-spinning");
        void catFrame.offsetWidth;
        catFrame.classList.add("is-spinning");
      });

      catFrame.addEventListener("animationend", (event) => {
        if (event.animationName === "catSpin") {
          catFrame.classList.remove("is-spinning");
        }
      });
    }
  </script>
</body>
</html>
