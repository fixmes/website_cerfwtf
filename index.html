<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cerf.wtf</title>

  <style>
    :root {
      --bg: #030706;
      --panel: rgba(0, 10, 7, 0.92);
      --border: #19ff9c;
      --text: #eafff2;
      --muted: #0091548f;
      --accent: #7bff00;
      --accent-2: #baff6f;
      --white: #f4f4f4;
      --cyan: rgba(0, 220, 255, 0.55);
      --red: rgb(255, 0, 85);
      --shadow: rgba(0, 255, 102, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "JetBrains Mono", "Cascadia Code", "Consolas", "Courier New", monospace;
      font-weight: 800;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(0, 255, 120, 0.09), transparent 32%),
        linear-gradient(rgba(0, 255, 100, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 100, 0.045) 1px, transparent 1px),
        var(--bg);
      background-size: auto, 18px 18px, 18px 18px, auto;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "01000011 01000101 01010010 01000110 00100000 01010111 01010100 01000110 00100000 01110100 01100101 01110010 01101101 01101001 01101110 01100001 01101100 00100000 01101101 01101111 01100100 01100101";
      position: fixed;
      inset: 0;
      z-index: 0;
      padding: 12px;
      color: rgba(0, 255, 102, 0.06);
      font-size: 11px;
      line-height: 1.8;
      word-spacing: 10px;
      pointer-events: none;
      overflow: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.025),
        rgba(255, 255, 255, 0.025) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      mix-blend-mode: screen;
    }

    a {
      color: inherit;
    }

    .page {
      position: relative;
      z-index: 2;
      width: min(1100px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 42px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 38px;
    }

    .chromatic-target {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 38px;
      transition: filter 0.18s ease, transform 0.18s ease;
    }

    body.badge-hover .chromatic-target,
    body.badge-hover .corp-link:not(.is-active) {
      filter:
        drop-shadow(-2px 0 var(--red))
        drop-shadow(2px 0 var(--cyan))
        brightness(1.08)
        contrast(1.12);
      transform: translateX(1px);
    }

    .title {
      margin: 0;
      width: 100%;
      text-align: center;
      font-size: clamp(48px, 8vw, 92px);
      line-height: 0.9;
      letter-spacing: 0.18em;
      text-transform: lowercase;
      color: var(--accent);
      text-shadow:
        0 0 8px rgba(100, 255, 106, 0.7),
        0 0 22px rgba(100, 255, 106, 0.35);
      cursor: default;
    }

    .title::before,
    .title::after {
      display: inline-block;
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .title::before {
      content: "[";
      margin-right: 0.22em;
      transform: translateX(16px);
    }

    .title::after {
      content: "]";
      margin-left: 0.22em;
      transform: translateX(-16px);
    }

    .title:hover::before,
    .title:hover::after,
    .title:focus-visible::before,
    .title:focus-visible::after {
      opacity: 1;
      transform: translateX(0);
    }

    .main-box {
      width: min(760px, 100%);
      position: relative;
      z-index: 5;
      padding: 30px;
      background: var(--panel);
      border: 1px solid var(--border);
      overflow: visible;
      box-shadow:
        0 0 0 1px rgba(0, 255, 102, 0.08) inset,
        0 0 24px var(--shadow),
        -2px 0 0 rgba(255, 0, 80, 0.35),
        2px 0 0 rgba(0, 220, 255, 0.35);
    }

    .main-box::before {
      content: "[   something something something   ]";
      position: absolute;
      top: -13px;
      left: 16px;
      padding: 0 12px;
      background: var(--bg);
      color: var(--text);
      font-size: 10px;
      letter-spacing: 0.06em;
    }

    .main-layout {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 28px;
      align-items: start;
      overflow: visible;
    }

    .profile-panel,
    .side-panel {
      position: relative;
      overflow: visible;
    }

    .profile-head {
      display: grid;
      grid-template-columns: 1fr 0.72fr;
      gap: 16px;
      align-items: start;
      margin-bottom: 18px;
    }

    .name {
      margin: 0;
      font-size: clamp(42px, 5vw, 58px);
      line-height: 0.95;
      letter-spacing: -0.07em;
      color: var(--white);
    }

    .alias {
      margin: 14px 0 0;
      color: var(--white);
      font-size: 13px;
      line-height: 1.3;
      text-align: left;
    }

    .roles {
      margin: 0 0 18px;
      padding: 0;
      list-style: none;
      color: var(--white);
      font-size: 14px;
      line-height: 1.55;
      text-align: center;
    }

    .prompt-line {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 15px;
    }

    .image-link,
    .spinner-link {
      display: inline-block;
      color: inherit;
      text-decoration: none;
    }

    .image-box {
      width: 100%;
      min-height: 185px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      background: var(--white);
      color: #050505;
      overflow: hidden;
      box-shadow: 0 0 12px rgba(0, 255, 102, 0.12);
    }

    .image-box img {
      width: 100%;
      height: 100%;
      min-height: 185px;
      object-fit: cover;
      display: block;
    }

    .ksyva-zone {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: end;
    }

    .ksyva-control {
      display: grid;
      gap: 8px;
      min-width: 230px;
    }

    .mini-label {
      color: var(--accent-2);
      font-size: 11px;
      text-transform: lowercase;
    }

    .spin-button,
    .ascii-btn {
      appearance: none;
      min-height: 45px;
      border: 1px solid var(--border);
      background: rgba(0, 255, 100, 0.05);
      color: var(--text);
      font: inherit;
      cursor: pointer;
      transition: 0.2s ease;
      padding: 10px 14px;
      text-transform: lowercase;
    }

    .spin-button:hover,
    .spin-button:focus-visible,
    .ascii-btn:hover,
    .ascii-btn:focus-visible {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 16px rgba(0, 255, 102, 0.35);
      outline: none;
    }

    .counter-label {
      color: var(--accent-2);
      font-size: clamp(18px, 3vw, 26px);
      line-height: 1;
      text-transform: lowercase;
    }

    .counter-number {
      display: inline-block;
      min-width: 2ch;
    }

    .spinner-character {
      width: clamp(118px, 16vw, 170px);
      height: auto;
      display: block;
      transform-origin: 50% 60%;
      filter:
        drop-shadow(-1px 0 rgba(255, 0, 80, 0.4))
        drop-shadow(1px 0 rgba(0, 220, 255, 0.4))
        drop-shadow(0 0 8px rgba(100, 255, 106, 0.25));
    }

    .spinner-character.spinning {
      animation: ksyvaSpin 0.75s linear;
    }

    @keyframes ksyvaSpin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    .lastfm-widget {
      display: grid;
      grid-template-columns: 150px 1fr;
      min-height: 164px;
      background: var(--white);
      color: #070707;
      border: 1px solid var(--white);
      text-decoration: none;
      overflow: hidden;
      transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
    }

    .lastfm-widget:hover,
    .lastfm-widget:focus-visible {
      transform: translateY(-3px);
      filter:
        drop-shadow(-2px 0 rgba(255, 0, 80, 0.55))
        drop-shadow(2px 0 rgba(0, 220, 255, 0.55));
      box-shadow: 0 0 16px rgba(0, 255, 102, 0.24);
      outline: none;
    }

    .lastfm-cover {
      aspect-ratio: 1 / 1;
      border-right: 4px solid #070707;
      background: #4eff22;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .lastfm-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .lastfm-info {
      padding: 13px 14px;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .now-playing {
      font-size: 14px;
      color: #111;
    }

    .track-title {
      font-size: 16px;
      line-height: 1.05;
      text-transform: lowercase;
    }

    .track-meta {
      font-size: 14px;
      line-height: 1.35;
    }

    .links-title {
      margin: 20px 0 12px;
      color: var(--accent);
      font-size: clamp(38px, 5vw, 54px);
      line-height: 0.9;
      letter-spacing: -0.08em;
      text-transform: lowercase;
      text-shadow: 0 0 10px rgba(100, 255, 106, 0.42);
    }

    .link-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .link-list a {
      display: block;
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      background: rgba(0, 255, 100, 0.04);
      color: var(--text);
      text-decoration: none;
      transition: 0.2s ease;
    }

    .link-list a::before {
      content: "[link]";
      margin-right: 10px;
      color: var(--accent);
    }

    .link-list a:hover,
    .link-list a:focus-visible {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 14px rgba(0, 255, 102, 0.35);
      outline: none;
    }

    .link-list a:hover::before,
    .link-list a:focus-visible::before {
      color: var(--bg);
    }

    .advice-box {
      margin-top: 26px;
      display: grid;
      gap: 6px;
      justify-items: end;
      position: relative;
      z-index: 50;
      overflow: visible;
    }

    .advice-label {
      color: var(--accent-2);
      font-size: 12px;
      text-transform: lowercase;
    }

    .advice-box .ascii-btn {
      width: 100%;
    }

    .advisor-field {
      width: 100%;
      min-height: 315px;
      margin-top: 12px;
      border: 1px solid var(--border);
      background: rgba(0, 255, 100, 0.025);
      box-shadow:
        inset 0 0 22px rgba(0, 255, 102, 0.08),
        0 0 12px rgba(0, 255, 102, 0.1);
      position: relative;
      z-index: 50;
      overflow: visible;
    }

    .advisor-overlay {
      position: absolute;
      inset: 0;
      z-index: 999;
      opacity: 0;
      transform: translateY(18px) scale(0.98);
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      overflow: visible;
    }

    .advisor-overlay.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .advisor-card {
      position: absolute;
      left: 10px;
      right: -110px;
      bottom: 12px;
      min-height: 170px;
      display: grid;
      grid-template-columns: 135px 1fr;
      gap: 14px;
      align-items: end;
      overflow: visible;
    }

    .advisor-image {
      width: 135px;
      max-width: none;
      height: auto;
      display: block;
      align-self: end;
      z-index: 2;
      filter:
        drop-shadow(-2px 0 rgba(255, 0, 80, 0.7))
        drop-shadow(2px 0 rgba(0, 220, 255, 0.7))
        drop-shadow(0 0 12px rgba(100, 255, 106, 0.5));
    }

    .advisor-bubble {
      min-height: 112px;
      display: flex;
      align-items: center;
      padding: 16px 18px;
      background: rgba(0, 10, 7, 0.98);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: clamp(14px, 1.7vw, 18px);
      line-height: 1.25;
      z-index: 3;
      box-shadow:
        0 0 24px rgba(0, 255, 102, 0.28),
        -2px 0 0 rgba(255, 0, 80, 0.5),
        2px 0 0 rgba(0, 220, 255, 0.5);
    }

    .advisor-bubble::before {
      content: "> ";
      color: var(--accent);
      margin-right: 8px;
      flex-shrink: 0;
    }

    .corp-section {
      width: min(1040px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .ascii-line {
  width: 100%;
  text-align: center;
  color: rgba(234, 255, 242, 0.38);
  font-size: clamp(13px, 1.8vw, 18px);
  letter-spacing: 0.06em;
  text-shadow: none;
  overflow-wrap: anywhere;
}

.ascii-line a {
  color: inherit;
  text-decoration: none;
  opacity: 0.75;
}

.ascii-line a:hover,
.ascii-line a:focus-visible {
  color: var(--accent-2);
  opacity: 1;
  outline: none;
}

    .sponsor-title {
      margin: 0;
      color: var(--accent);
      text-align: center;
      font-size: clamp(40px, 6vw, 68px);
      line-height: 0.9;
      letter-spacing: -0.07em;
      text-transform: lowercase;
      text-shadow:
        0 0 10px rgba(100, 255, 106, 0.52),
        -2px 0 rgba(255, 0, 80, 0.35),
        2px 0 rgba(0, 220, 255, 0.35);
    }

    .corp-links {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      align-items: center;
    }

    .corp-link {
      display: block;
      position: relative;
      border: 1px solid var(--border);
      background: rgba(0, 255, 100, 0.04);
      box-shadow: 0 0 14px rgba(0, 255, 102, 0.08);
      overflow: hidden;
      transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .corp-link img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 500 / 176;
      object-fit: cover;
    }

    .corp-link::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.22), transparent);
      transform: translateX(-120%);
      transition: transform 0.35s ease;
      pointer-events: none;
    }

    .corp-link:hover,
    .corp-link:focus-visible,
    .corp-link.is-active {
      z-index: 3;
      transform: translateY(-4px) scale(1.025);
      border-color: var(--accent);
      box-shadow:
        0 0 20px rgba(0, 255, 102, 0.28),
        -2px 0 0 rgba(255, 0, 80, 0.7),
        2px 0 0 rgba(0, 220, 255, 0.7);
      outline: none;
    }

    .corp-link:hover::after,
    .corp-link:focus-visible::after,
    .corp-link.is-active::after {
      transform: translateX(120%);
    }

    .footer-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      letter-spacing: 0.12em;
      text-shadow:
        -1px 0 rgba(255, 0, 80, 0.5),
        1px 0 rgba(0, 220, 255, 0.5);
    }

    @media (max-width: 820px) {
      .main-layout,
      .profile-head {
        grid-template-columns: 1fr;
      }

      .ksyva-zone {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .ksyva-control {
        width: 100%;
      }

      .corp-links {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .advisor-card {
        right: 10px;
        grid-template-columns: 120px 1fr;
      }

      .advisor-image {
        width: 120px;
      }
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 18px, 1000px);
        padding-top: 24px;
      }

      .main-box {
        padding: 20px 16px;
      }

      .lastfm-widget {
        grid-template-columns: 1fr;
      }

      .lastfm-cover {
        border-right: 0;
        border-bottom: 4px solid #070707;
      }

      .corp-links {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .advisor-field {
        min-height: 260px;
      }

      .advisor-card {
        left: 8px;
        right: 8px;
        bottom: 8px;
        min-height: 150px;
        grid-template-columns: 92px 1fr;
        gap: 10px;
      }

      .advisor-image {
        width: 92px;
      }

      .advisor-bubble {
        min-height: 96px;
        padding: 12px 14px;
        font-size: 14px;
      }
    }

    @media (max-width: 420px) {
      .corp-links {
        grid-template-columns: 1fr;
      }

      .advisor-card {
        grid-template-columns: 1fr;
      }

      .advisor-image {
        width: 120px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="chromatic-target">
      <h1 class="title" tabindex="0">cerf.wtf</h1>

      <section class="main-box" id="about">
        <div class="main-layout">
          <section class="profile-panel" aria-label="О создательнице">
            <div class="profile-head">
              <h2 class="name">fixmes</h2>
              <p class="alias">фикс (она\её)</p>
            </div>

            <ul class="roles">
              <li>разработчица видеоигр</li>
              <li>мерчеделка</li>
              <li>щитпостерка</li>
            </ul>

            <p class="prompt-line">&gt;</p>

            <a class="image-link" href="https://t.me/fixmes" target="_blank" rel="noreferrer">
              <div class="image-box">
                <img src="image/jobless.png" alt="jobless" onerror="this.src='image/main.png';" />
              </div>
            </a>

            <p class="prompt-line" aria-hidden="true">&gt;</p>

            <div class="ksyva-zone">
              <div class="ksyva-control">
                <div class="mini-label">крутилка ксивы</div>
                <button class="spin-button" id="spinButton" type="button">крути ксиву</button>
                <div class="counter-label">счетчик: <span class="counter-number" id="spinCount">0</span></div>
              </div>

              <a class="spinner-link" href="https://t.me/fixmes" target="_blank" rel="noreferrer">
                <img src="image/spinner.png" alt="spinner" class="spinner-character" id="spinnerImage" />
              </a>
            </div>
          </section>

          <aside class="side-panel" aria-label="Ссылки и виджеты">
            <a class="lastfm-widget" href="https://www.last.fm/user/fixmes" target="_blank" rel="noreferrer" aria-label="Last FM fixmes">
              <div class="lastfm-cover">
                <img src="image/music.png" alt="last.fm cover" onerror="this.src='image/main.png';" />
              </div>

              <div class="lastfm-info">
                <div class="now-playing">ХАСКИ НИКОГДА-НИБУДЬ</div>
                <div class="track-title">last.fm</div>
                <div class="track-meta">check</div>
              </div>
            </a>

            <h2 class="links-title">ссылки</h2>

            <nav class="link-list" aria-label="Основные ссылки">
              <a href="https://t.me/fixmes" target="_blank" rel="noreferrer">telegram</a>
              <a href="https://vk.com/fixmes" target="_blank" rel="noreferrer">vkontakte</a>
            </nav>

            <div class="advice-box">
              <div class="advice-label">совет от ксивы</div>
              <button class="ascii-btn" type="button" id="adviceButton">press !</button>

              <div class="advisor-field">
                <div class="advisor-overlay" id="advisorOverlay" aria-hidden="true">
                  <div class="advisor-card">
                    <img src="image/advisor.png" alt="advisor" class="advisor-image" />
                    <div class="advisor-bubble" id="advisorText">советов не будет</div>
                  </div>
                </div>
              </div>
            </div>
          </aside>
        </div>
      </section>
    </div>

    <section class="corp-section" id="sponsors">
      <div class="chromatic-target">
        <div class="ascii-line">
          <a href="https://webring.otomir23.me/fixmes/prev" target="_blank" rel="noreferrer">&lt;===</a>
          <a href="https://webring.otomir23.me/" target="_blank" rel="noreferrer">webring</a>
          <a href="https://webring.otomir23.me/fixmes/next" target="_blank" rel="noreferrer">===&gt;</a>
        </div>

      <div class="corp-links" aria-label="Спонсоры CERF WTF">
        <a class="corp-link" href="#general-ringo" aria-label="General Ringo">
          <img src="image/generalringo.png" alt="General Ringo" width="500" height="176" />
        </a>

        <a class="corp-link" href="#vex-industries" aria-label="Vex Industries">
          <img src="image/vexindustries.png" alt="Vex Industries" width="500" height="176" />
        </a>

        <a class="corp-link" href="#free-radicals" aria-label="Free Radicals">
          <img src="image/freeradicals.png" alt="Free Radicals" width="500" height="176" />
        </a>

        <a class="corp-link" href="#icc" aria-label="Interstellar Communication Corporation">
          <img src="image/icc.png" alt="Interstellar Communication Corporation" width="500" height="176" />
        </a>

        <a class="corp-link" href="#lifetime-lease-remedies" aria-label="Lifetime Lease Remedies">
          <img src="image/remedies.png" alt="Lifetime Lease Remedies" width="500" height="176" />
        </a>
      </div>

      <div class="chromatic-target">
        <div class="footer-note">
          01000011 01000101 01010010 01000110 / fixmes kat lore is below
        </div>
      </div>
    </section>
  </main>

  <script>
    const spinButton = document.getElementById("spinButton");
    const spinCount = document.getElementById("spinCount");
    const spinnerImage = document.getElementById("spinnerImage");

    let count = 0;

    if (spinButton && spinCount && spinnerImage) {
      spinButton.addEventListener("click", () => {
        count += 1;
        spinCount.textContent = count;

        spinnerImage.classList.remove("spinning");
        void spinnerImage.offsetWidth;
        spinnerImage.classList.add("spinning");
      });
    }

    const adviceButton = document.getElementById("adviceButton");
    const advisorOverlay = document.getElementById("advisorOverlay");
    const advisorText = document.getElementById("advisorText");

    const adviceList = [
      "советов не будет",
      "советы были только в советском союзе",
      "спи по 8 часов в день",
      "помойся пожалуйста",
      "зубы чистил? молодец",
      "пей водичку",
      "спасибо, что попросили совет!"
    ];

    let advisorTimeout = null;

    if (adviceButton && advisorOverlay && advisorText) {
      adviceButton.addEventListener("click", () => {
        const randomAdvice = adviceList[Math.floor(Math.random() * adviceList.length)];
        advisorText.textContent = randomAdvice;

        advisorOverlay.classList.add("show");
        advisorOverlay.setAttribute("aria-hidden", "false");

        if (advisorTimeout) {
          clearTimeout(advisorTimeout);
        }

        advisorTimeout = setTimeout(() => {
          advisorOverlay.classList.remove("show");
          advisorOverlay.setAttribute("aria-hidden", "true");
        }, 2800);
      });
    }

    const corpLinks = document.querySelectorAll(".corp-link");

    corpLinks.forEach((link) => {
      link.addEventListener("mouseenter", () => {
        document.body.classList.add("badge-hover");
        link.classList.add("is-active");
      });

      link.addEventListener("mouseleave", () => {
        document.body.classList.remove("badge-hover");
        link.classList.remove("is-active");
      });

      link.addEventListener("focus", () => {
        document.body.classList.add("badge-hover");
        link.classList.add("is-active");
      });

      link.addEventListener("blur", () => {
        document.body.classList.remove("badge-hover");
        link.classList.remove("is-active");
      });
    });
  </script>
</body>
</html>
